version: "3.9"

# Servicios de la plataforma Compa
# Nomenclatura: compa-{servicio} según CONTEXTO_PROYECTO.md

services:

  # ── Base de datos PostgreSQL 15 con PostGIS y pg_trgm ──
  compa-db:
    image: postgis/postgis:15-3.3
    container_name: compa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: compa_dev
      POSTGRES_USER: compa_user
      POSTGRES_PASSWORD: compa_pass
    ports:
      - "5432:5432"
    volumes:
      - compa_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compa_user -d compa_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis: broker de Celery y almacén de sesiones conversacionales ──
  compa-redis:
    image: redis:7-alpine
    container_name: compa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - compa_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API FastAPI ──
  compa-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compa-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # La API necesita la DB y Redis levantados primero
    depends_on:
      compa-db:
        condition: service_healthy
      compa-redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Worker Celery para tareas asíncronas y CRON ──
  compa-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compa-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      compa-db:
        condition: service_healthy
      compa-redis:
        condition: service_healthy
    command: >
      celery -A worker.celery_app worker
      --loglevel=info
      --beat
      --scheduler celery.beat.PersistentScheduler

volumes:
  compa_db_data:
  compa_redis_data:
